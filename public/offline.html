<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPic - Offline</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 3rem; margin: 0; }
    p { font-size: 1.2rem; margin: 1rem 0; }
    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 1rem;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡</h1>
    <h1>Sin conexión</h1>
    <p>No tienes conexión a internet en este momento</p>
    <p>La aplicación cargará automáticamente cuando vuelvas a estar online</p>
    <button onclick="location.reload()">🔄 Reintentar</button>
  </div>
  
  <script>
    // Detectar cuando vuelva la conexión
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
